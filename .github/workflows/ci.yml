name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install web dependencies
        run: cd web && bun install

      - name: Type check (backend)
        run: bunx tsc --noEmit

      - name: Type check (web)
        run: bunx tsc -p web/tsconfig.json --noEmit

      - name: Run tests
        run: bun test

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build web
        run: bun run build:web

      - name: Verify dist output
        run: |
          test -d web/dist && echo "Web build OK" || (echo "Web build failed" && exit 1)
          test -f web/dist/index.html && echo "index.html exists" || (echo "index.html missing" && exit 1)
