settings_page:
  gear_button: "button:has(svg.lucide-settings) | document.querySelectorAll('button')[4]"
  close_button: "button:text('Close')"

navigation:
  knowledge_base_tab: "button:text('Knowledge Base')"
  ask_tab: "button:text('Ask')"
  chat_tab: "button:text('Chat')"
  new_chat: "button:text('New Chat')"

search_pipeline_section:
  section_header: "contains text '搜索管道' or 'SEARCH PIPELINE'"
  enable_switch: ".ant-switch within parent containing '搜索管道'"
  engine_tags:
    container: ".flex.flex-wrap.gap-1.5"
    bing: "span.ant-tag:text('Bing')"
    google: "span.ant-tag:text('Google')"
    baidu: "span.ant-tag:text('Baidu')"
    duckduckgo: "span.ant-tag:text('DuckDuckGo')"
  cdp_endpoint_input: "input[placeholder*='ws://']"
  headless_switch: ".ant-switch within XBrowser sub-section"
  timeout_input: ".ant-input-number within XBrowser sub-section"

search_config_section:
  search_mode_select: ".ant-select containing 'Combined (Hybrid)'"
  weight_sliders:
    token: ".ant-slider-handle[aria-valuenow] within parent containing 'Token'"
    tfidf: ".ant-slider-handle[aria-valuenow] within parent containing 'TF-IDF'"
    semantic: ".ant-slider-handle[aria-valuenow] within parent containing 'Semantic'"

llm_direct_section:
  toggle: ".ant-switch within parent containing 'LLM 直接回答'"
  base_url_input: "input[placeholder='https://api.example.com/v1']"
  api_key_input: "input[placeholder='sk-xxx']"
  model_input: "input[placeholder='gpt-4o / deepseek-chat']"

chat_section:
  message_input: "textarea[placeholder='Type a message...']"
  send_button: "button near textarea, becomes enabled when text entered"
