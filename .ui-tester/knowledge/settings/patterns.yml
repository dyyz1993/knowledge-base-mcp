# Module: settings
# Reusable operation sequences

open_settings:
  description: "Open settings panel from any page"
  steps:
    - action: eval
      selector: "document.querySelectorAll('button')[4].click()"
      description: "Click gear icon in top nav bar"
  expected_result: "Settings drawer opens on right side"

toggle_engine_tag:
  description: "Toggle search engine tags on/off"
  steps:
    - action: eval
      selector: "document.querySelectorAll('span.ant-tag')"
      description: "Find engine tag by text content, click to toggle"
      notes: |
        Selected state: bg rgba(31,111,235,0.2), color rgb(96,165,250), border rgb(59,130,246)
        Unselected state: bg rgb(39,39,42), color rgb(161,161,170), border rgb(63,63,70)
  expected_result: "Tag visual state changes between highlighted and muted"

toggle_llm_direct:
  description: "Toggle LLM Direct section on/off"
  steps:
    - action: eval
      selector: "Find .ant-switch in parent containing 'LLM 直接回答', click it"
      description: "Toggle LLM Direct switch"
  expected_result: "Base URL, API Key, Model fields appear/disappear"

send_chat_message:
  description: "Send a message in Chat tab"
  steps:
    - action: fill
      selector: "textarea[placeholder='Type a message...']"
      description: "Type message in chat input"
    - action: eval
      selector: "Find enabled button near textarea, click"
      description: "Click send button"
  wait_after_submit: 15000
  expected_result: "AI response with possible tool call blocks"

tips:
  - "Settings opens as a right-side drawer panel"
  - "Engine tags use ant-tag component with visual state changes"
  - "Ant Design sliders don't use native input[type=range], use .ant-slider-handle with role=slider"
  - "Tool call blocks render as inline [工具: tool_name → ...] in markdown body, not as separate expandable UI"
  - "CDP endpoint at 9221, connect with --cdp flag"
