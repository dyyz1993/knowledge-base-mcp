# Module: ask
# Site: http://localhost:19877
# Version: 3
# Status: verified
# Last updated: 2026-05-25
# Verified in round: r3

ask_page:
  url: "http://localhost:19877 (Ask tab)"
  nav_ask_button: "button (matches text 'Ask' - use find text 'Ask' click)"
  model_selector: "select (HTML select element with model options)"
  model_selector_default: "GLM-4.5 Air (value: zhipuai|glm-4.5-air)"
  query_input: "textarea[placeholder*='你想了解什么']"
  placeholder_text: "你想了解什么？描述一下你的问题..."

  # Mode buttons (3 total, use aria-pressed to identify)
  # Mode buttons only show SVG icons, no visible text labels
  # Button order: [Quick/Zap, Standard/Brain, Deep/Monitor]
  mode_quick_button: "button[aria-pressed]:nth-of-type(1)"
  mode_standard_button: "button[aria-pressed]:nth-of-type(2)"
  mode_deep_button: "button[aria-pressed]:nth-of-type(3)"
  mode_active_class_indicator:
    quick: "bg-amber-900/50 text-amber"
    standard: "bg-purple-900/50 text-purple-300"
    deep: "bg-blue-900/50 text-blue-30"

  # Submit buttons (2, both disabled when textarea empty)
  send_button: "button.bg-amber-600.shrink-0"
  agent_research_button: "button.bg-purple-700"
  button_disabled_style: "disabled:opacity-30 disabled:cursor-not-allowed"

  # Stop button during query
  stop_button: "button (text '停止查询')"

empty_state:
  sparkle_icon: "svg (data-lucide='sparkles' or similar)"
  title_text: "智能问答"
  description_text: "输入问题后先搜索知识库"
  feature_card_query: ".rounded-lg (text '普通查询')"
  feature_card_agent: ".rounded-lg (text 'Agent 深度研究')"
  suggestion_queries: "p.text-\\[10px\\].text-zinc-500.cursor-pointer"
  suggestion_example: "p.cursor-pointer (text '如何配置 semantic search？')"

response_area:
  container: "div.flex-1.overflow-y-auto.p-4"
  user_message_bubble: "contains 'test query' or user input text"
  multi_source_header: "text '多源搜索'"
  source_count: "text 'N 来源 · N 结果'"
  pi_answer: "text 'PI 回答:'"
  llm_indicator: "text 'llm-knowledge'"

error_states:
  error_message: "text=查询失败"
  error_details: "button:has-text('查看详情')"

model_options:
  default: "默认模型"
  options:
    - "GLM-4"
    - "GLM-4.5"
    - "GLM-4.5 Air"
    - "GLM-4.7"
    - "GLM-5"
    - "GLM-5.1"
    - "DeepSeek V4 Pro"
    - "DeepSeek V4 Flash"
    - "MiniMax-M2.5"
    - "Kimi-K2.5"
    - "GLM-4V Plus"
    - "Kimi K2.5"
    - "Kimi K2.6"
    - "MiMo-V2.5"
    - "MiMo-V2.5-Pro"
    - "Astron Code Latest"
